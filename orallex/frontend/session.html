<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OralLex - Socratic Knowledge Capture</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .slide-in { animation: slideIn 0.4s ease-out forwards; }
        .pulse-subtle { animation: pulseSubtle 3s ease-in-out infinite; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes pulseSubtle {
            0%, 100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(79, 70, 229, 0); }
        }
        
        .highlight-gap { 
            background-color: #fef08a; 
            padding: 0 4px; 
            border-radius: 4px; 
            border-bottom: 2px solid #eab308;
            cursor: pointer;
        }

        /* Custom Scrollbar for Transcript */
        .transcript-scroll::-webkit-scrollbar { width: 6px; }
        .transcript-scroll::-webkit-scrollbar-track { background: transparent; }
        .transcript-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [view, setView] = useState('setup'); // setup | session | post_session
            
            // Session Setup State
            const [topic, setTopic] = useState('');
            const [expertName, setExpertName] = useState('');
            const [artifacts, setArtifacts] = useState({ sop: true, faq: true, tree: false });
            
            // Live Session State
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState([]); // Array of objects {text, isGap, type}
            const [questions, setQuestions] = useState([]);
            const [duration, setDuration] = useState(0);
            const [coverage, setCoverage] = useState(0);
            
            const ws = useRef(null);
            const mediaRecorder = useRef(null);
            const timerRef = useRef(null);
            const transcriptEndRef = useRef(null);
            let chunkSequence = 0;

            // Auto-scroll transcript
            useEffect(() => {
                if (transcriptEndRef.current) {
                    transcriptEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [transcript]);

            const startSession = async () => {
                if (!topic) return alert("Please enter a topic.");
                setView('session');
                setIsRecording(true);
                
                // Timer
                timerRef.current = setInterval(() => setDuration(prev => prev + 1), 1000);

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: { channelCount: 1, sampleRate: 16000, echoCancellation: true, noiseSuppression: true }
                    });
                    
                    const sessionId = Math.random().toString(36).substring(7);
                    ws.current = new WebSocket(`ws://${window.location.host}/ws/session/${sessionId}`);
                    
                    ws.current.onopen = () => {
                        ws.current.send(JSON.stringify({
                            type: 'start', session_id: sessionId, metadata: { topic, expertName, artifacts }
                        }));
                        
                        mediaRecorder.current = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                        mediaRecorder.current.ondataavailable = async (event) => {
                            if (event.data.size > 0 && ws.current.readyState === WebSocket.OPEN) {
                                // Convert blob to base64
                                const buffer = await event.data.arrayBuffer();
                                const base64String = btoa(String.fromCharCode(...new Uint8Array(buffer)));
                                
                                ws.current.send(JSON.stringify({
                                    type: 'audio_chunk', data: base64String, sequence: chunkSequence++, timestamp_ms: Date.now()
                                }));
                            }
                        };
                        mediaRecorder.current.start(3000); // 3 second chunks
                    };

                    ws.current.onmessage = (event) => {
                        const msg = JSON.parse(event.data);
                        if (msg.type === 'transcript') {
                            setTranscript(prev => [...prev, { text: msg.text, isGap: false }]);
                        } else if (msg.type === 'question') {
                            setQuestions(prev => [...prev, msg]);
                            // Highlight the triggering phrase in transcript (Mock UI logic)
                            setTranscript(prev => {
                                const newT = [...prev];
                                if (newT.length > 0) {
                                    newT[newT.length - 1].isGap = true;
                                    newT[newT.length - 1].gapType = msg.question_type;
                                }
                                return newT;
                            });
                        } else if (msg.type === 'status') {
                            setCoverage(msg.knowledge_coverage);
                        }
                    };
                } catch (err) {
                    console.error(err);
                    alert("Microphone access required.");
                }
            };

            const endSession = () => {
                if (mediaRecorder.current) mediaRecorder.current.stop();
                if (ws.current) ws.current.close();
                clearInterval(timerRef.current);
                setIsRecording(false);
                setView('post_session');
            };

            const markAnswered = (idx) => {
                const newQ = [...questions];
                newQ.splice(idx, 1);
                setQuestions(newQ);
                setCoverage(prev => Math.min(100, prev + 15)); // Mock coverage bump
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            // ==========================================
            // VIEWS
            // ==========================================

            if (view === 'setup') {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="bg-white p-10 rounded-2xl shadow-xl w-full max-w-2xl">
                            <h1 className="text-3xl font-bold text-slate-800 mb-2">OralLex Socratic Capture</h1>
                            <p className="text-slate-500 mb-8">Turn your tacit knowledge into structured artifacts just by talking.</p>
                            
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Topic / Knowledge Domain</label>
                                    <input type="text" value={topic} onChange={e => setTopic(e.target.value)} placeholder="e.g., Deploying to Production via Kubernetes" className="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Expert Name (Optional)</label>
                                    <input type="text" value={expertName} onChange={e => setExpertName(e.target.value)} placeholder="Jane Doe" className="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" />
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-3">Target Artifacts</label>
                                    <div className="flex gap-4">
                                        <label className="flex items-center space-x-2 cursor-pointer bg-slate-50 px-4 py-2 rounded-lg border border-slate-200 hover:bg-indigo-50 transition">
                                            <input type="checkbox" checked={artifacts.sop} onChange={() => setArtifacts({...artifacts, sop: !artifacts.sop})} className="rounded text-indigo-600 focus:ring-indigo-500 h-4 w-4" />
                                            <span className="text-slate-700 font-medium">SOP</span>
                                        </label>
                                        <label className="flex items-center space-x-2 cursor-pointer bg-slate-50 px-4 py-2 rounded-lg border border-slate-200 hover:bg-indigo-50 transition">
                                            <input type="checkbox" checked={artifacts.faq} onChange={() => setArtifacts({...artifacts, faq: !artifacts.faq})} className="rounded text-indigo-600 focus:ring-indigo-500 h-4 w-4" />
                                            <span className="text-slate-700 font-medium">FAQ</span>
                                        </label>
                                        <label className="flex items-center space-x-2 cursor-pointer bg-slate-50 px-4 py-2 rounded-lg border border-slate-200 hover:bg-indigo-50 transition">
                                            <input type="checkbox" checked={artifacts.tree} onChange={() => setArtifacts({...artifacts, tree: !artifacts.tree})} className="rounded text-indigo-600 focus:ring-indigo-500 h-4 w-4" />
                                            <span className="text-slate-700 font-medium">Decision Tree</span>
                                        </label>
                                    </div>
                                </div>

                                <button onClick={startSession} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl shadow-lg shadow-indigo-200 transition duration-200 mt-4 flex justify-center items-center gap-2">
                                    Start Live Interview
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'session') {
                return (
                    <div className="h-screen flex flex-col overflow-hidden">
                        {/* HEADER */}
                        <header className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0">
                            <div>
                                <h2 className="text-xl font-bold text-slate-800">{topic}</h2>
                                <div className="flex items-center gap-2 mt-1">
                                    <span className="relative flex h-3 w-3">
                                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                      <span className="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                                    </span>
                                    <span className="text-slate-500 font-mono text-sm">{formatTime(duration)} speaking</span>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-8">
                                <div className="flex flex-col items-end">
                                    <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Coverage</span>
                                    <div className="w-32 bg-slate-100 rounded-full h-2.5">
                                      <div className="bg-emerald-500 h-2.5 rounded-full transition-all duration-1000" style={{width: `${Math.max(10, coverage)}%`}}></div>
                                    </div>
                                </div>
                                <button onClick={endSession} className="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded-lg font-medium transition">
                                    End Session
                                </button>
                            </div>
                        </header>

                        {/* MAIN AREA */}
                        <div className="flex-1 flex overflow-hidden">
                            {/* Left: Transcript */}
                            <div className="w-3/5 bg-slate-50 border-r border-slate-200 p-8 overflow-y-auto transcript-scroll flex flex-col">
                                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-6">Live Transcript</h3>
                                
                                <div className="flex-1 space-y-2 text-lg text-slate-700 leading-relaxed">
                                    {transcript.length === 0 ? (
                                        <p className="text-slate-400 italic mt-10 text-center">Speak freely. Your words will appear here...</p>
                                    ) : (
                                        <p>
                                            {transcript.map((t, i) => (
                                                <span key={i} className={t.isGap ? "highlight-gap mx-1" : ""}>
                                                    {t.text} 
                                                </span>
                                            ))}
                                        </p>
                                    )}
                                    <div ref={transcriptEndRef} />
                                </div>
                            </div>

                            {/* Right: Question Queue */}
                            <div className="w-2/5 bg-white p-8 overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Socratic Engine</h3>
                                    {questions.length > 0 && <span className="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded-full font-bold">{questions.length} Pending</span>}
                                </div>

                                {questions.length === 0 ? (
                                    <div className="h-64 flex flex-col items-center justify-center text-slate-400">
                                        <svg className="w-12 h-12 mb-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                                        </svg>
                                        <p>Listening for implicit assumptions...</p>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        {/* Primary Question */}
                                        <div className="bg-indigo-50 border border-indigo-100 p-6 rounded-2xl shadow-sm slide-in pulse-subtle">
                                            <div className="flex items-center gap-2 mb-3">
                                                <span className="bg-indigo-600 text-white text-[10px] uppercase tracking-wider font-bold px-2 py-1 rounded">
                                                    {questions[0].question_type.replace('_', ' ')}
                                                </span>
                                            </div>
                                            <h4 className="text-xl font-semibold text-slate-800 mb-4">{questions[0].question_text}</h4>
                                            
                                            <div className="bg-white/60 p-3 rounded-lg mb-6 border border-indigo-50">
                                                <p className="text-sm text-slate-500 italic">"You mentioned: {questions[0].triggered_by}"</p>
                                            </div>
                                            
                                            <div className="flex gap-3">
                                                <button onClick={() => markAnswered(0)} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-medium transition">
                                                    Got it, Answered
                                                </button>
                                                <button onClick={() => markAnswered(0)} className="px-4 py-2 text-slate-500 hover:bg-indigo-100 hover:text-indigo-700 rounded-lg font-medium transition">
                                                    Skip
                                                </button>
                                            </div>
                                        </div>

                                        {/* Queue */}
                                        {questions.slice(1).map((q, idx) => (
                                            <div key={idx} className="bg-white border border-slate-200 p-4 rounded-xl opacity-75">
                                                <span className="text-xs font-bold text-slate-400 uppercase block mb-1">{q.question_type.replace('_', ' ')}</span>
                                                <p className="text-slate-700">{q.question_text}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* BOTTOM BAR */}
                        <div className="bg-slate-800 text-slate-300 px-6 py-3 flex justify-between items-center text-sm shrink-0">
                            <div className="flex items-center gap-4">
                                <div className="flex items-end gap-1 h-4">
                                    <div className="w-1 bg-emerald-400 h-2/3 animate-pulse"></div>
                                    <div className="w-1 bg-emerald-400 h-full animate-pulse delay-75"></div>
                                    <div className="w-1 bg-emerald-400 h-1/2 animate-pulse delay-150"></div>
                                </div>
                                <span>Mic Active</span>
                            </div>
                            <div className="flex gap-6">
                                <label className="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" className="rounded text-indigo-500" />
                                    <span>Pause Socratic Engine</span>
                                </label>
                                <span>Language: Auto-detect (English)</span>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'post_session') {
                return (
                    <div className="min-h-screen p-8 bg-slate-50">
                        <div className="max-w-5xl mx-auto">
                            <div className="flex justify-between items-end mb-8">
                                <div>
                                    <h1 className="text-3xl font-bold text-slate-800 mb-2">Session Complete</h1>
                                    <p className="text-slate-500">Topic: {topic} | Duration: {formatTime(duration)}</p>
                                </div>
                                <button className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-200 transition">
                                    Generate Artifacts
                                </button>
                            </div>

                            <div className="grid grid-cols-2 gap-8">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                        Transcript & Gaps
                                    </h3>
                                    <div className="text-slate-600 leading-relaxed text-sm">
                                        {transcript.map((t, i) => (
                                            <span key={i} className={t.isGap ? "highlight-gap mx-1 relative group" : ""}>
                                                {t.text}
                                                {t.isGap && (
                                                    <div className="absolute hidden group-hover:block bottom-full left-0 mb-2 bg-slate-800 text-white text-xs p-2 rounded shadow-xl w-48 z-10">
                                                        Resolved: {t.gapType}
                                                    </div>
                                                )}
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                        <h3 className="font-bold text-slate-800 mb-4">Pending Artifacts</h3>
                                        <div className="space-y-3">
                                            {artifacts.sop && (
                                                <div className="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-slate-100">
                                                    <span className="font-medium text-slate-700">Standard Operating Procedure</span>
                                                    <span className="text-xs font-bold text-amber-500 bg-amber-50 px-2 py-1 rounded">QUEUED</span>
                                                </div>
                                            )}
                                            {artifacts.faq && (
                                                <div className="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-slate-100">
                                                    <span className="font-medium text-slate-700">FAQ Corpus</span>
                                                    <span className="text-xs font-bold text-amber-500 bg-amber-50 px-2 py-1 rounded">QUEUED</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className="bg-indigo-50 border border-indigo-100 p-6 rounded-2xl">
                                        <h3 className="font-bold text-indigo-900 mb-2">Publishing Destinations</h3>
                                        <p className="text-indigo-700 text-sm mb-4">Select where the finalized artifacts should be pushed.</p>
                                        <div className="flex gap-2">
                                            <button className="bg-white text-slate-700 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 transition">Notion</button>
                                            <button className="bg-white text-slate-700 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 transition">Confluence</button>
                                            <button className="bg-white text-slate-700 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 transition">AgentOS ChromaDB</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
