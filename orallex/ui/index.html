<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OralLex - Socratic Capture</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; color: #1f2937; margin: 0; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        h1 { margin-top: 0; color: #4f46e5; }
        .controls { margin-bottom: 2rem; display: flex; gap: 1rem; }
        button { padding: 0.75rem 1.5rem; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
        .btn-start { background-color: #10b981; color: white; }
        .btn-start:hover { background-color: #059669; }
        .btn-stop { background-color: #ef4444; color: white; }
        .btn-stop:hover { background-color: #dc2626; }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .transcript-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 1rem; min-height: 200px; margin-bottom: 2rem; white-space: pre-wrap; line-height: 1.5; }
        .question-box { background: #eef2ff; border-left: 4px solid #4f46e5; padding: 1rem; border-radius: 0 6px 6px 0; min-height: 100px; }
        .question-title { font-weight: 600; color: #4f46e5; margin-bottom: 0.5rem; display: block; }
        .status { margin-left: auto; align-self: center; font-size: 0.875rem; color: #6b7280; }
        .status.recording { color: #ef4444; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [socraticQuestion, setSocraticQuestion] = useState("Waiting for conversation...");
            
            const mediaRecorder = useRef(null);
            const ws = useRef(null);

            const startSession = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    // Initialize WebSocket
                    const sessionId = Math.random().toString(36).substring(7);
                    const wsUrl = `ws://${window.location.host}/ws/session/${sessionId}`;
                    ws.current = new WebSocket(wsUrl);
                    
                    ws.current.onopen = () => {
                        console.log("WebSocket connected");
                        setIsRecording(true);
                        
                        // Initialize MediaRecorder
                        mediaRecorder.current = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                        
                        mediaRecorder.current.ondataavailable = (event) => {
                            if (event.data.size > 0 && ws.current.readyState === WebSocket.OPEN) {
                                ws.current.send(event.data);
                            }
                        };
                        
                        // Send audio chunks every 2 seconds
                        mediaRecorder.current.start(2000);
                    };

                    ws.current.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        if (data.type === 'transcript') {
                            setTranscript(prev => prev + " " + data.text);
                        } else if (data.type === 'question') {
                            setSocraticQuestion(data.text);
                        }
                    };

                } catch (err) {
                    console.error("Error accessing microphone:", err);
                    alert("Microphone access is required.");
                }
            };

            const stopSession = () => {
                if (mediaRecorder.current && isRecording) {
                    mediaRecorder.current.stop();
                    mediaRecorder.current.stream.getTracks().forEach(track => track.stop());
                }
                if (ws.current) {
                    ws.current.close();
                }
                setIsRecording(false);
            };

            return (
                <div className="container">
                    <h1>OralLex Tacit Capture</h1>
                    
                    <div className="controls">
                        <button 
                            className="btn-start" 
                            onClick={startSession} 
                            disabled={isRecording}>
                            {isRecording ? "Listening..." : "Start Session"}
                        </button>
                        <button 
                            className="btn-stop" 
                            onClick={stopSession} 
                            disabled={!isRecording}>
                            Stop Session
                        </button>
                        <span className={`status ${isRecording ? 'recording' : ''}`}>
                            {isRecording ? "● Recording & Streaming to AI" : "Ready"}
                        </span>
                    </div>

                    <h3>Live Transcript</h3>
                    <div className="transcript-box">
                        {transcript || "Speak freely. Your words will appear here..."}
                    </div>

                    <h3>Socratic Engine</h3>
                    <div className="question-box">
                        <span className="question-title">OralLex Follow-up:</span>
                        {socraticQuestion}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
